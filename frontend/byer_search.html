<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Estate-AI | Find Properties</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:'Inter',sans-serif;background:#f7f9fb}
.heading{font-family:'Manrope',sans-serif}
.toast{position:fixed;bottom:24px;right:24px;z-index:999;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:600;animation:slideup .3s ease}
.toast.success{background:#10b981;color:#fff}.toast.error{background:#ef4444;color:#fff}
@keyframes slideup{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.card{background:#fff;border-radius:16px;border:1px solid #e5e7eb}
.prop-card{background:#fff;border-radius:16px;border:1px solid #e5e7eb;overflow:hidden;cursor:pointer;transition:all .2s}
.prop-card:hover{box-shadow:0 8px 30px rgba(0,0,0,.1);transform:translateY(-2px)}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600}
input,select{padding:10px 14px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;outline:none;font-family:'Inter',sans-serif;transition:border-color .2s;background:#fff;width:100%}
input:focus,select:focus{border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.1)}
.btn{padding:10px 20px;border-radius:10px;font-weight:600;font-size:14px;border:none;cursor:pointer;transition:all .2s}
.btn-green{background:#10b981;color:#fff}.btn-green:hover{background:#059669}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:20px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding:32px}
.feat-chip{display:inline-block;background:#f0fdf4;color:#166534;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:500;margin:3px}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<!-- Nav -->
<nav class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-40">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center text-white font-bold text-sm">E</div>
    <span class="heading font-bold text-gray-900">Estate-AI</span>
    <span class="text-gray-300 mx-1">|</span>
    <span class="text-sm text-gray-500">Property Search</span>
  </div>
  <div class="flex items-center gap-3">
    <a href="seller_dashboard.html" class="text-sm font-medium text-emerald-600 hover:underline">Are you a seller? →</a>
    <a href="zara.html" class="btn btn-green text-sm py-2 px-4">🎙️ Talk to Zara</a>
  </div>
</nav>

<!-- Hero Search -->
<div style="background:linear-gradient(135deg,#064e3b,#065f46,#047857)" class="px-6 py-14 text-white">
  <div class="max-w-3xl mx-auto text-center">
    <h1 class="heading text-4xl font-extrabold mb-3">Find Your Dream Property</h1>
    <p class="text-emerald-200 mb-8 text-lg">Lahore's best properties — directly from verified sellers</p>
    <!-- Search bar -->
    <div class="bg-white rounded-2xl p-4 shadow-xl flex flex-col md:flex-row gap-3">
      <input type="text" id="q-location" placeholder="🔍 Location (DHA, Bahria Town...)" style="flex:2;border:1px solid #e5e7eb"/>
      <select id="q-type" style="flex:1;border:1px solid #e5e7eb">
        <option value="">All Types</option>
        <option>House</option><option>Bungalow</option><option>Apartment</option>
        <option>Plot</option><option>Commercial Plot</option><option>Shop</option>
      </select>
      <select id="q-beds" style="flex:1;border:1px solid #e5e7eb">
        <option value="">Any Beds</option>
        <option value="1">1+ Beds</option><option value="2">2+ Beds</option>
        <option value="3">3+ Beds</option><option value="4">4+ Beds</option><option value="5">5+ Beds</option>
      </select>
      <button onclick="doSearch()" class="btn btn-green px-8">Search</button>
    </div>
  </div>
</div>

<!-- Filters bar -->
<div class="bg-white border-b border-gray-200 px-6 py-3 flex flex-wrap gap-3 items-center">
  <span class="text-sm text-gray-500 font-medium">Price:</span>
  <select id="q-max" class="text-sm" style="width:auto;padding:6px 12px">
    <option value="">Max Budget</option>
    <option value="10000000">Up to 1 Crore</option>
    <option value="30000000">Up to 3 Crore</option>
    <option value="50000000">Up to 5 Crore</option>
    <option value="100000000">Up to 10 Crore</option>
    <option value="200000000">Up to 20 Crore</option>
  </select>
  <button onclick="doSearch()" class="text-sm text-emerald-600 font-semibold hover:underline">Apply</button>
  <button onclick="clearSearch()" class="text-sm text-gray-400 hover:underline">Clear filters</button>
  <span class="ml-auto text-sm text-gray-500" id="result-count"></span>
</div>

<!-- Results -->
<div class="max-w-6xl mx-auto px-4 py-8">
  <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
    <!-- Loading skeletons -->
    ${Array(6).fill('<div class="prop-card p-5"><div class="skeleton h-5 w-3/4 mb-3"></div><div class="skeleton h-4 w-1/2 mb-4"></div><div class="skeleton h-8 w-1/3"></div></div>').join('')}
  </div>
</div>

<!-- Property Detail Modal -->
<div id="detail-modal" class="modal-bg hidden">
  <div class="modal">
    <div class="flex items-start justify-between mb-4">
      <h2 class="heading text-xl font-bold text-gray-900 pr-4" id="d-title"></h2>
      <button onclick="closeDetail()" class="text-gray-400 text-2xl flex-shrink-0">&times;</button>
    </div>
    <p class="text-sm text-gray-500 mb-1" id="d-location"></p>
    <div class="flex flex-wrap gap-2 my-3" id="d-chips"></div>
    <p class="heading text-2xl font-bold text-emerald-600 mb-4" id="d-price"></p>
    <p class="text-sm text-gray-700 mb-4 leading-relaxed" id="d-desc"></p>
    <div class="flex flex-wrap mb-4" id="d-features"></div>
    <div style="background:#f0fdf4;border-radius:12px;padding:16px;margin-bottom:20px">
      <p class="text-sm font-semibold text-gray-700 mb-1">📞 Seller Contact</p>
      <p class="text-emerald-700 font-bold" id="d-phone"></p>
      <p class="text-sm text-gray-500" id="d-seller-name"></p>
    </div>
    <!-- Inquiry form -->
    <div style="background:#f9fafb;border-radius:12px;padding:20px">
      <p class="font-semibold text-gray-800 mb-3">Send Inquiry to Seller</p>
      <div class="space-y-3">
        <input type="hidden" id="inq-property-id"/>
        <input id="inq-name" placeholder="Your Name *"/>
        <input id="inq-phone" placeholder="Your Phone *"/>
        <input id="inq-email" placeholder="Your Email (optional)"/>
        <textarea id="inq-msg" rows="2" placeholder="Message (optional)" style="width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;outline:none;resize:none"></textarea>
        <button onclick="sendInquiry()" class="btn btn-green w-full">Send Inquiry 📩</button>
      </div>
    </div>
  </div>
</div>

<script>
const API='http://127.0.0.1:8000';
let allProps=[];

// Load on page open
window.onload=()=>doSearch();

async function doSearch(){
  const location=document.getElementById('q-location').value.trim();
  const type=document.getElementById('q-type').value;
  const beds=document.getElementById('q-beds').value;
  const maxPrice=document.getElementById('q-max').value;

  showSkeletons();

  try{
    const params=new URLSearchParams();
    if(location) params.set('location',location);
    if(type)     params.set('type',type);
    if(beds)     params.set('bedrooms',beds);
    if(maxPrice) params.set('max_price',maxPrice);

    const r=await fetch(`${API}/api/properties?${params}`);
    const d=await r.json();
    allProps=d.properties||[];
    renderProps(allProps);
    document.getElementById('result-count').textContent=`${allProps.length} properties found`;
  }catch(e){
    document.getElementById('results-grid').innerHTML='<div class="col-span-3 text-center py-16 text-red-400"><p class="text-lg font-semibold mb-2">⚠️ Backend not running</p><p class="text-sm">Run: uvicorn server:app --reload --port 8000</p></div>';
  }
}

function clearSearch(){
  ['q-location','q-type','q-beds','q-max'].forEach(id=>{document.getElementById(id).value=''});
  doSearch();
}

function showSkeletons(){
  document.getElementById('results-grid').innerHTML=Array(6).fill(`
    <div class="card p-5">
      <div class="skeleton h-5 mb-3" style="width:75%;height:18px"></div>
      <div class="skeleton mb-3" style="width:50%;height:14px"></div>
      <div class="flex gap-2 mb-4">
        <div class="skeleton" style="width:50px;height:24px"></div>
        <div class="skeleton" style="width:60px;height:24px"></div>
      </div>
      <div class="skeleton" style="width:40%;height:22px"></div>
    </div>`).join('');
}

function renderProps(props){
  const g=document.getElementById('results-grid');
  if(!props.length){
    g.innerHTML='<div class="col-span-3 text-center py-16 text-gray-400"><div class="text-5xl mb-4">🔍</div><p class="text-lg font-medium">No properties found</p><p class="text-sm mt-1">Try different filters</p></div>';
    return;
  }
  g.innerHTML=props.map(p=>`
    <div class="prop-card" onclick='openDetail(${JSON.stringify(p)})'>
      <div class="h-1.5 bg-emerald-500"></div>
      <div class="p-5">
        <div class="flex items-start justify-between gap-2 mb-2">
          <span class="badge" style="background:#d1fae5;color:#065f46">${p.type}</span>
          <span class="text-xs text-gray-400">${p.area_marla} Marla</span>
        </div>
        <h3 class="heading font-bold text-gray-900 mb-1 leading-tight">${p.title}</h3>
        <p class="text-xs text-gray-500 mb-3">📍 ${p.location}</p>
        <div class="flex flex-wrap gap-2 text-xs text-gray-600 mb-4">
          ${p.bedrooms?`<span class="bg-gray-100 px-2 py-1 rounded-full">🛏 ${p.bedrooms} bed</span>`:''}
          ${p.bathrooms?`<span class="bg-gray-100 px-2 py-1 rounded-full">🚿 ${p.bathrooms} bath</span>`:''}
        </div>
        <div class="flex items-center justify-between">
          <p class="heading text-lg font-bold text-emerald-600">PKR ${p.price_display}</p>
          <span class="text-xs text-emerald-600 font-semibold">View →</span>
        </div>
      </div>
    </div>`).join('');
}

function openDetail(p){
  document.getElementById('d-title').textContent=p.title;
  document.getElementById('d-location').textContent='📍 '+p.location;
  document.getElementById('d-price').textContent='PKR '+p.price_display;
  document.getElementById('d-desc').textContent=p.description||'No description provided.';
  document.getElementById('d-phone').textContent=p.seller_phone;
  document.getElementById('d-seller-name').textContent='Seller: '+p.seller_name;
  document.getElementById('inq-property-id').value=p.id;

  const chips=document.getElementById('d-chips');
  chips.innerHTML=[
    p.type&&`<span class="badge" style="background:#d1fae5;color:#065f46">${p.type}</span>`,
    p.area_marla&&`<span class="badge" style="background:#e0f2fe;color:#0369a1">${p.area_marla} Marla</span>`,
    p.bedrooms&&`<span class="badge" style="background:#f3f4f6;color:#374151">🛏 ${p.bedrooms} Beds</span>`,
    p.bathrooms&&`<span class="badge" style="background:#f3f4f6;color:#374151">🚿 ${p.bathrooms} Baths</span>`,
  ].filter(Boolean).join('');

  const feats=(p.features||[]);
  document.getElementById('d-features').innerHTML=feats.map(f=>`<span class="feat-chip">✓ ${f}</span>`).join('');

  document.getElementById('detail-modal').classList.remove('hidden');
}
function closeDetail(){document.getElementById('detail-modal').classList.add('hidden')}

async function sendInquiry(){
  const pid=document.getElementById('inq-property-id').value;
  const name=document.getElementById('inq-name').value.trim();
  const phone=document.getElementById('inq-phone').value.trim();
  const email=document.getElementById('inq-email').value.trim();
  const msg=document.getElementById('inq-msg').value.trim();
  if(!name||!phone){showToast('Enter your name and phone','error');return}
  try{
    const r=await fetch(`${API}/api/inquiries`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({property_id:pid,buyer_name:name,buyer_phone:phone,buyer_email:email,message:msg})});
    const d=await r.json();
    if(d.success){
      showToast('Inquiry sent! Seller will contact you 📞','success');
      closeDetail();
      ['inq-name','inq-phone','inq-email','inq-msg'].forEach(id=>{document.getElementById(id).value=''});
    }else showToast(d.detail||'Error','error');
  }catch(e){showToast('Cannot connect to backend','error')}
}

function showToast(msg,type='success'){
  const t=document.createElement('div');
  t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3500);
}

// Search on Enter
document.getElementById('q-location').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});
</script>
</body>
</html>
